<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Module Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
        }
        .status {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .error {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .success {
            background: #44ff44;
            color: black;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        canvas {
            border: 2px solid #333;
            background: black;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Simple Module Test</h1>
    
    <div id="status" class="status">
        Testing module imports...
    </div>
    
    <canvas id="gameCanvas" width="400" height="640"></canvas>
    
    <script type="module">
        const status = document.getElementById('status');
        
        try {
            status.innerHTML = 'Step 1: Testing gameConfig import...';
            
            // Test basic config import
            const { GAME_CONFIG } = await import('./config/gameConfig.js');
            status.innerHTML += '<div class="success">✅ gameConfig loaded</div>';
            
            status.innerHTML += '<div>Step 2: Testing constants import...</div>';
            const constants = await import('./src/core/constants.js');
            status.innerHTML += '<div class="success">✅ constants loaded</div>';
            
            status.innerHTML += '<div>Step 3: Testing main.js import...</div>';
            const { BubbleShooterApp } = await import('./src/main.js');
            status.innerHTML += '<div class="success">✅ main.js loaded</div>';
            
            status.innerHTML += '<div>Step 4: Creating app instance...</div>';
            const canvas = document.getElementById('gameCanvas');
            const app = new BubbleShooterApp(canvas);
            status.innerHTML += '<div class="success">✅ App instance created</div>';
            
            status.innerHTML += '<div>Step 5: Initializing...</div>';
            const game = await app.initialize();
            status.innerHTML += '<div class="success">✅ Game initialized successfully!</div>';
            
        } catch (error) {
            status.innerHTML += '<div class="error">❌ Error: ' + error.message + '</div>';
            status.innerHTML += '<div class="error">Stack: ' + error.stack + '</div>';
            console.error('Full error:', error);
        }
    </script>
</body>
</html>
